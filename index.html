function atualizarTeclas(e, pressionado) {
    if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") teclas.esquerda = pressionado;
    if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") teclas.direita = pressionado;
    if (e.key === "ArrowUp" || e.key === "w" || e.key === "W" || e.key === " ") teclas.cima = pressionado;
}
window.addEventListener("keydown", (e) => atualizarTeclas(e, true));
window.addEventListener("keyup", (e) => atualizarTeclas(e, false));

// Transição Segura de Tela (Zera inércias físicas para evitar falhas)
function executarTransicao(destinoID) {
    nodoAtual = historia[destinoID];
    jogador.x = 60;
    jogador.y = 400;
    jogador.v_x = 0;
    jogador.v_y = 0;
}

function atualizar() {

    if (teclas.esquerda) {
        jogador.v_x = -jogador.velocidade;
        jogador.olhandoDireita = false;
        jogador.tempoMovimento += 1;

        jogador.v_x = jogador.velocidade;
        jogador.olhandoDireita = true;
        jogador.tempoMovimento += 1;

        jogador.v_x *= FISICA.friccao;

            jogador.v_x = 0;
            jogador.tempoMovimento = 0;
        }
    }

    jogador.v_y += FISICA.gravidade;

        jogador.v_y = FISICA.limiteVelocidadeY;
    }
